name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".github/scripts/**"
  workflow_dispatch:
    inputs:
      api_individual:
        description: "Generate individual JSON files (one per entity)"
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install mkdocs-material mkdocs-static-i18n jsonschema mkdocs-minify-plugin

      - name: Prepare build environment
        run: bash .github/scripts/prepare_docs.sh

      - name: Build site
        run: mkdocs build

      - name: Split sitemap into index
        run: python3 .github/scripts/split_sitemap.py

      - name: Generate JSON API
        run: >
          python3 .github/scripts/generate_api.py
          --src-root src/dnd
          --output-dir site/api
          ${{ github.event.inputs.api_individual == 'true' && '--individual' || '' }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
