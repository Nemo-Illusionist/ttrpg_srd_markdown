<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- d20 icosahedron shape -->
  <polygon points="32,2 58,18 58,46 32,62 6,46 6,18"
           fill="#7c3aed" stroke="#6d28d9" stroke-width="2" stroke-linejoin="round"/>
  <!-- inner facet lines -->
  <line x1="32" y1="2" x2="32" y2="62" stroke="#6d28d9" stroke-width="1.2" opacity="0.5"/>
  <line x1="6" y1="18" x2="58" y2="46" stroke="#6d28d9" stroke-width="1.2" opacity="0.5"/>
  <line x1="58" y1="18" x2="6" y2="46" stroke="#6d28d9" stroke-width="1.2" opacity="0.5"/>
  <!-- "20" text -->
  <text x="32" y="40" text-anchor="middle" font-family="Arial,Helvetica,sans-serif"
        font-size="22" font-weight="bold" fill="#FFFFFF">20</text>
</svg>
